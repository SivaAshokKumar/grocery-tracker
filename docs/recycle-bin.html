<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 AMRS Shop Tracker - Recycle Bin</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            max-width: 1200px;
            margin: 0 auto;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 13px;
        }
        .nav-links {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        .nav-links a {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: white;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            border: 2px solid #667eea;
            transition: all 0.3s ease;
        }
        .nav-links a:hover, .nav-links a.active {
            background: #667eea;
            color: white;
        }
        .stats-card {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }
        .stats-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .stats-card .value {
            font-size: 32px;
            font-weight: 700;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .btn-success {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
        }
        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.4);
        }
        .btn-danger {
            background: linear-gradient(135deg, #dc3545 0%, #c82333 100%);
            color: white;
        }
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(220, 53, 69, 0.4);
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        thead {
            background: linear-gradient(135deg, #ff9800 0%, #f57c00 100%);
            color: white;
        }
        th {
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        tr:nth-child(even) {
            background: #fff8e1;
        }
        tr:hover {
            background: #ffecb3;
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 16px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #ff9800;
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ff9800;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #b1dfbb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f1b0b7;
        }
        .deleted-at {
            color: #dc3545;
            font-weight: 600;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 20px 15px;
            }
            h1 {
                font-size: 22px;
            }
            .nav-links {
                flex-wrap: wrap;
            }
            .nav-links a {
                font-size: 12px;
                padding: 10px;
            }
            th, td {
                padding: 10px 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🗑️ AMRS Shop Tracker - Recycle Bin</h1>
        <p class="subtitle">Restore or Permanently Delete Transactions</p>
        
        <div class="nav-links">
            <a href="index.html">📥 Entry</a>
            <a href="viewer.html">📊 View Data</a>
            <a href="recycle-bin.html" class="active">🗑️ Recycle Bin</a>
        </div>
        
        <div class="stats-card">
            <h3>Deleted Transactions</h3>
            <div class="value" id="deletedCount">0</div>
        </div>
        
        <div class="actions">
            <button class="btn btn-primary" onclick="loadDeletedData()">🔄 Refresh</button>
            <button class="btn btn-success" onclick="restoreAll()">♻️ Restore All</button>
            <button class="btn btn-danger" onclick="emptyRecycleBin()">🗑️ Empty Recycle Bin</button>
        </div>
        
        <div id="message"></div>
        
        <div class="table-container">
            <div id="tableContent">
                <div class="loading">Loading deleted items...</div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // HARDCODED SUPABASE CONFIGURATION
        // ==========================================
        const SUPABASE_URL = 'https://qgnmyqayxylfacrnhxiw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnbm15cWF5eHlsZmFjcm5oeGl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMDgxMjcsImV4cCI6MjA5Mzg4NDEyN30.emW2ijd4y7VLwdI0phDphtm7tvHzz1p9TcisWcBl7mk';
        
        let deletedData = [];
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.className = 'message ' + type;
            msgDiv.textContent = text;
            setTimeout(() => {
                msgDiv.className = '';
                msgDiv.textContent = '';
            }, 5000);
        }
        
        async function loadDeletedData() {
            document.getElementById('tableContent').innerHTML = '<div class="loading">Loading deleted items...</div>';
            
            try {
                // Only show non-hidden (visible) recycle bin items - soft delete pattern
                const response = await fetch(`${SUPABASE_URL}/rest/v1/recycle_bin?is_hidden=eq.false&order=deleted_at.desc`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                
                if (response.ok) {
                    deletedData = await response.json();
                    displayDeletedData(deletedData);
                    document.getElementById('deletedCount').textContent = deletedData.length;
                } else {
                    const errorText = await response.text();
                    console.error('Recycle bin load error:', errorText);
                    document.getElementById('tableContent').innerHTML = `<div class="no-data">❌ Error loading recycle bin: ${errorText}</div>`;
                }
            } catch (error) {
                document.getElementById('tableContent').innerHTML = `<div class="no-data">❌ Error: ${error.message}</div>`;
            }
        }
        
        function displayDeletedData(data) {
            if (data.length === 0) {
                document.getElementById('tableContent').innerHTML = '<div class="no-data">🗑️ Recycle Bin is empty. No deleted transactions found.</div>';
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Original Created</th>
                            <th>Deleted At</th>
                            <th>Sale Amount (₹)</th>
                            <th>Expense Name</th>
                            <th>Expense Amount (₹)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            data.forEach((row, index) => {
                const createdDate = new Date(row.created_at).toLocaleString('en-IN');
                const deletedDate = new Date(row.deleted_at).toLocaleString('en-IN');
                
                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${createdDate}</td>
                        <td class="deleted-at">${deletedDate}</td>
                        <td>${row.sale_amount ? '₹' + parseFloat(row.sale_amount).toFixed(2) : '-'}</td>
                        <td>${row.expense_name || '-'}</td>
                        <td>${row.expense_amount ? '₹' + parseFloat(row.expense_amount).toFixed(2) : '-'}</td>
                        <td>
                            <button onclick="restoreRow('${row.id}')" class="btn btn-success" style="padding: 6px 12px; font-size: 12px; margin-right: 5px;">♻️ Restore</button>
                            <button onclick="permanentDelete('${row.id}')" class="btn btn-danger" style="padding: 6px 12px; font-size: 12px;">🗑️ Delete</button>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            document.getElementById('tableContent').innerHTML = html;
        }
        
        async function restoreRow(id) {
            const row = deletedData.find(r => r.id === id);
            if (!row) return;
            
            if (!confirm('Are you sure you want to restore this transaction?')) return;
            
            try {
                // Step 1: Insert back into transactions
                const restoreData = {
                    sale_amount: row.sale_amount,
                    expense_name: row.expense_name,
                    expense_amount: row.expense_amount
                };
                
                const insertResponse = await fetch(`${SUPABASE_URL}/rest/v1/transactions`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(restoreData)
                });
                
                if (!insertResponse.ok) {
                    showMessage('❌ Error restoring transaction', 'error');
                    return;
                }
                
                // Step 2: Soft delete - mark as hidden in recycle_bin (data preserved in DB)
                const hideResponse = await fetch(`${SUPABASE_URL}/rest/v1/recycle_bin?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ is_hidden: true })
                });
                
                if (hideResponse.ok) {
                    showMessage('✅ Transaction restored successfully! (Hidden from Recycle Bin view)', 'success');
                    loadDeletedData();
                } else {
                    const errText = await hideResponse.text();
                    console.error('Hide from recycle bin error:', errText);
                    showMessage('❌ Error hiding from recycle bin: ' + errText, 'error');
                }
            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'error');
            }
        }
        
        async function restoreAll() {
            if (deletedData.length === 0) {
                showMessage('No items to restore', 'error');
                return;
            }
            
            if (!confirm(`Are you sure you want to restore all ${deletedData.length} transactions?`)) return;
            
            let restored = 0;
            let failed = 0;
            
            for (const row of deletedData) {
                try {
                    const restoreData = {
                        sale_amount: row.sale_amount,
                        expense_name: row.expense_name,
                        expense_amount: row.expense_amount
                    };
                    
                    const insertResponse = await fetch(`${SUPABASE_URL}/rest/v1/transactions`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_ANON_KEY,
                            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=minimal'
                        },
                        body: JSON.stringify(restoreData)
                    });
                    
                    if (insertResponse.ok) {
                        await fetch(`${SUPABASE_URL}/rest/v1/recycle_bin?id=eq.${row.id}`, {
                            method: 'DELETE',
                            headers: {
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                            }
                        });
                        restored++;
                    } else {
                        failed++;
                    }
                } catch (error) {
                    failed++;
                }
            }
            
            showMessage(`✅ Restored ${restored} transactions${failed > 0 ? `, ${failed} failed` : ''}`, restored > 0 ? 'success' : 'error');
            loadDeletedData();
        }
        
        async function permanentDelete(id) {
            if (!confirm('⚠️ This will move this transaction to ROOT BACKUP and hide from view.\n\n✅ Data will be preserved forever!')) return;
            if (!confirm('Really sure? Data will be backed up to root_backup table and hidden here.')) return;
            
            try {
                // Step 1: Get the record from recycle_bin
                const getResponse = await fetch(`${SUPABASE_URL}/rest/v1/recycle_bin?id=eq.${id}`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                
                if (!getResponse.ok) {
                    showMessage('❌ Error fetching record', 'error');
                    return;
                }
                
                const records = await getResponse.json();
                if (records.length === 0) {
                    showMessage('❌ Record not found', 'error');
                    return;
                }
                
                const record = records[0];
                
                // Step 2: Copy to root_backup (permanent archive)
                const backupData = {
                    original_id: record.original_id,
                    created_at: record.created_at,
                    deleted_at: record.deleted_at,
                    sale_amount: record.sale_amount,
                    expense_name: record.expense_name,
                    expense_amount: record.expense_amount
                };
                
                const backupResponse = await fetch(`${SUPABASE_URL}/rest/v1/root_backup`, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(backupData)
                });
                
                if (!backupResponse.ok) {
                    const errText = await backupResponse.text();
                    console.error('Backup to root_backup failed:', errText);
                    showMessage('❌ Error backing up to root_backup', 'error');
                    return;
                }
                
                // Step 3: Hide from recycle_bin view (soft delete)
                const hideResponse = await fetch(`${SUPABASE_URL}/rest/v1/recycle_bin?id=eq.${id}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ is_hidden: true })
                });
                
                if (hideResponse.ok) {
                    showMessage('✅ Transaction backed up to ROOT BACKUP and hidden from view!', 'success');
                    loadDeletedData();
                } else {
                    const errText = await hideResponse.text();
                    console.error('Hide error:', errText);
                    showMessage('❌ Error hiding from recycle bin', 'error');
                }
            } catch (error) {
                console.error('Permanent delete error:', error);
                showMessage('❌ Error: ' + error.message, 'error');
            }
        }
        
        async function emptyRecycleBin() {
            if (deletedData.length === 0) {
                showMessage('Recycle bin is already empty', 'error');
                return;
            }
            
            if (!confirm(`⚠️ This will HIDE ALL ${deletedData.length} transactions from the Recycle Bin view.\n\n✅ Data will be PRESERVED in Supabase database forever.\n❌ Data will be HIDDEN from this page only.\n\nContinue?`)) return;
            if (!confirm('Really sure? Items will be hidden from view but kept safely in the database.')) return;
            
            try {
                // Step 1: Get all visible (non-hidden) recycle bin items with full data
                const getResponse = await fetch(`${SUPABASE_URL}/rest/v1/recycle_bin?is_hidden=eq.false&select=*`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_ANON_KEY,
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
                    }
                });
                
                if (!getResponse.ok) {
                    const errorText = await getResponse.text();
                    console.error('Empty Recycle Bin - Get Data Error:', getResponse.status, errorText);
                    showMessage('❌ Error fetching recycle bin data: ' + errorText, 'error');
                    return;
                }
                
                const allRecords = await getResponse.json();
                console.log('Found', allRecords.length, 'items to backup and hide');
                
                if (allRecords.length === 0) {
                    showMessage('✅ Recycle bin is empty!', 'success');
                    loadDeletedData();
                    return;
                }
                
                // Step 2: Copy each record to root_backup (permanent archive)
                let backedUp = 0;
                for (const record of allRecords) {
                    try {
                        const backupData = {
                            original_id: record.original_id,
                            created_at: record.created_at,
                            deleted_at: record.deleted_at,
                            sale_amount: record.sale_amount,
                            expense_name: record.expense_name,
                            expense_amount: record.expense_amount
                        };
                        
                        const backupResponse = await fetch(`${SUPABASE_URL}/rest/v1/root_backup`, {
                            method: 'POST',
                            headers: {
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json',
                                'Prefer': 'return=minimal'
                            },
                            body: JSON.stringify(backupData)
                        });
                        
                        if (backupResponse.ok) {
                            backedUp++;
                        } else {
                            console.error('Failed to backup to root_backup:', record.id, await backupResponse.text());
                        }
                    } catch (e) {
                        console.error('Exception backing up to root_backup:', record.id, e);
                    }
                }
                
                // Step 3: Hide each record from recycle_bin view (soft delete)
                let hidden = 0;
                let failed = 0;
                
                for (const record of allRecords) {
                    try {
                        const hideResponse = await fetch(`${SUPABASE_URL}/rest/v1/recycle_bin?id=eq.${record.id}`, {
                            method: 'PATCH',
                            headers: {
                                'apikey': SUPABASE_ANON_KEY,
                                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                                'Content-Type': 'application/json',
                                'Prefer': 'return=minimal'
                            },
                            body: JSON.stringify({ is_hidden: true })
                        });
                        
                        if (hideResponse.ok) {
                            hidden++;
                        } else {
                            failed++;
                            const errText = await hideResponse.text();
                            console.error('Failed to hide recycle item:', record.id, hideResponse.status, errText);
                        }
                    } catch (e) {
                        failed++;
                        console.error('Exception hiding recycle item:', record.id, e);
                    }
                }
                
                console.log('Results - Backed up to root_backup:', backedUp, 'Hidden from view:', hidden, 'Failed:', failed);
                
                if (failed === 0) {
                    showMessage(`✅ Recycle bin processed! ${backedUp} backed up to ROOT BACKUP, ${hidden} hidden from view.`, 'success');
                } else if (hidden > 0) {
                    showMessage(`⚠️ Backed up ${backedUp}, hidden ${hidden}, failed ${failed}. Check console.`, 'error');
                } else {
                    showMessage(`❌ Failed to process recycle bin. ${failed} items failed. Check console.`, 'error');
                }
                
                loadDeletedData();
            } catch (error) {
                console.error('Empty Recycle Bin Error:', error);
                showMessage('❌ Error: ' + error.message, 'error');
            }
        }
        
        // Load on page load
        loadDeletedData();
    </script>
</body>
</html>
