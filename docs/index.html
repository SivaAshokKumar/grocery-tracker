<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 AMRS Shop Tracker - Data Entry</title>
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 8px;
            font-size: 26px;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 13px;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #444;
            font-weight: 600;
            font-size: 13px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .optional {
            color: #999;
            font-weight: 400;
            font-size: 11px;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .message {
            margin-top: 18px;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }
        .message.success {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            display: block;
            border: 1px solid #b1dfbb;
        }
        .message.error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            display: block;
            border: 1px solid #f1b0b7;
        }
        .nav-links {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .nav-links a {
            flex: 1;
            text-align: center;
            padding: 10px;
            background: white;
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            border-radius: 10px;
            border: 2px solid #667eea;
            transition: all 0.3s ease;
        }
        .nav-links a:hover, .nav-links a.active {
            background: #667eea;
            color: white;
        }
        .config-section {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .config-section label {
            font-size: 12px;
            margin-bottom: 5px;
        }
        .config-section input {
            font-size: 12px;
            padding: 10px;
            margin-bottom: 8px;
        }
        .config-section small {
            color: #666;
            font-size: 11px;
            display: block;
        }
        .save-config-btn {
            width: 100%;
            padding: 8px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            margin-top: 5px;
        }
        
        /* Mobile Responsive */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 25px 20px;
                border-radius: 20px;
            }
            h1 {
                font-size: 22px;
            }
            .subtitle {
                font-size: 12px;
            }
            input[type="text"], input[type="number"] {
                padding: 12px 14px;
                font-size: 16px;
            }
            button {
                padding: 14px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 AMRS Shop Tracker</h1>
        <p class="subtitle">Sales & Expense Management System</p>
        
        <div class="nav-links">
            <a href="index.html" class="active">📥 Entry</a>
            <a href="viewer.html">📊 View Data</a>
        </div>
        
        <div class="config-section" id="configSection">
            <label>Supabase URL</label>
            <input type="text" id="supabaseUrl" placeholder="https://xxxxxx.supabase.co">
            <label>Supabase Anon Key</label>
            <input type="password" id="supabaseKey" placeholder="eyJ...">
            <small>⚙️ These are saved locally in your browser</small>
            <button class="save-config-btn" onclick="saveConfig()">💾 Save Configuration</button>
        </div>
        
        <form id="trackerForm">
            <div class="form-group">
                <label for="sale_amount">Sale Amount <span class="optional">(optional)</span></label>
                <input type="number" id="sale_amount" name="sale_amount" step="0.01" placeholder="Enter sale amount">
            </div>
            
            <div class="form-group">
                <label for="expense_name">Expense Name <span class="optional">(optional)</span></label>
                <input type="text" id="expense_name" name="expense_name" placeholder="Enter expense name">
            </div>
            
            <div class="form-group">
                <label for="expense_amount">Expense Amount <span class="optional">(optional)</span></label>
                <input type="number" id="expense_amount" name="expense_amount" step="0.01" placeholder="Enter expense amount">
            </div>
            
            <button type="submit" id="submitBtn">💾 Save Transaction</button>
        </form>
        
        <div id="message" class="message"></div>
    </div>

    <script>
        // ==========================================
        // HARDCODED SUPABASE CONFIGURATION
        // Replace these with your actual credentials
        // ==========================================
        const SUPABASE_URL = 'https://qgnmyqayxylfacrnhxiw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnbm15cWF5eHlsZmFjcm5oeGl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMDgxMjcsImV4cCI6MjA5Mzg4NDEyN30.emW2ijd4y7VLwdI0phDphtm7tvHzz1p9TcisWcBl7mk';
        
        // Alternative: Use localStorage if you want to keep it dynamic
        const supabaseUrl = localStorage.getItem('supabase_url') || SUPABASE_URL;
        const supabaseKey = localStorage.getItem('supabase_key') || SUPABASE_ANON_KEY;
        
        // Show config section only if credentials not available
        if (supabaseUrl && supabaseKey) {
            document.getElementById('configSection').style.display = 'none';
        }
        
        function saveConfig() {
            const url = document.getElementById('supabaseUrl').value.trim();
            const key = document.getElementById('supabaseKey').value.trim();
            
            if (!url || !key) {
                alert('Please enter both Supabase URL and Key');
                return;
            }
            
            localStorage.setItem('supabase_url', url);
            localStorage.setItem('supabase_key', key);
            document.getElementById('configSection').style.display = 'none';
            showMessage('✅ Configuration saved!', 'success');
            location.reload(); // Reload to use new credentials
        }
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.className = 'message ' + type;
            msgDiv.textContent = text;
            setTimeout(() => {
                msgDiv.className = 'message';
                msgDiv.textContent = '';
            }, 5000);
        }
        
        document.getElementById('trackerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            
            // Check if credentials are available
            const finalUrl = localStorage.getItem('supabase_url') || SUPABASE_URL;
            const finalKey = localStorage.getItem('supabase_key') || SUPABASE_ANON_KEY;
            
            if (!finalUrl || !finalKey) {
                document.getElementById('configSection').style.display = 'block';
                showMessage('⚠️ Please configure Supabase first', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Saving...';
            
            const data = {
                sale_amount: document.getElementById('sale_amount').value || null,
                expense_name: document.getElementById('expense_name').value || null,
                expense_amount: document.getElementById('expense_amount').value || null
            };
            
            try {
                const response = await fetch(`${finalUrl}/rest/v1/transactions`, {
                    method: 'POST',
                    headers: {
                        'apikey': finalKey,
                        'Authorization': `Bearer ${finalKey}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(data)
                });
                
                if (response.ok) {
                    showMessage('✅ Transaction saved successfully!', 'success');
                    document.getElementById('trackerForm').reset();
                } else {
                    const error = await response.text();
                    showMessage('❌ Error: ' + error, 'error');
                }
            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '💾 Save Transaction';
            }
        });
    </script>
</body>
</html>
