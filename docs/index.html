<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Shop Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 35px 30px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
            max-width: 420px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 8px;
            font-size: 26px;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 13px;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 18px;
        }
        label {
            display: block;
            margin-bottom: 6px;
            color: #444;
            font-weight: 600;
            font-size: 13px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #fafafa;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }
        .optional {
            color: #999;
            font-weight: 400;
            font-size: 11px;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 8px;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .message {
            margin-top: 18px;
            padding: 14px;
            border-radius: 10px;
            text-align: center;
            display: none;
            font-size: 14px;
            font-weight: 500;
        }
        .message.success {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            display: block;
            border: 1px solid #b1dfbb;
        }
        .message.error {
            background: linear-gradient(135deg, #f8d7da 0%, #f5c6cb 100%);
            color: #721c24;
            display: block;
            border: 1px solid #f1b0b7;
        }
        .info-box {
            margin-top: 20px;
            padding: 16px;
            background: linear-gradient(135deg, #e3f2fd 0%, #bbdefb 100%);
            border-radius: 12px;
            font-size: 12px;
            color: #1565c0;
            text-align: center;
            border: 1px solid #90caf9;
        }
        .info-box strong {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
        }
        .info-box small {
            display: block;
            margin-top: 8px;
            opacity: 0.8;
        }
        .view-data-btn {
            display: block;
            text-align: center;
            margin-top: 15px;
            padding: 12px;
            background: white;
            color: #667eea;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            border-radius: 10px;
            border: 2px solid #667eea;
            transition: all 0.3s ease;
        }
        .view-data-btn:hover {
            background: #667eea;
            color: white;
        }
        
        /* Mobile Responsive */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 25px 20px;
                border-radius: 20px;
            }
            h1 {
                font-size: 22px;
            }
            .subtitle {
                font-size: 12px;
            }
            input[type="text"], input[type="number"] {
                padding: 12px 14px;
                font-size: 16px; /* Prevents zoom on iOS */
            }
            button {
                padding: 14px;
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Grocery Shop Tracker</h1>
        <p class="subtitle">Sales & Expense Management System</p>
        
        <form id="trackerForm" action="https://script.google.com/macros/s/AKfycbzQSJgWuPlvYQAf9EMX-TtZqz9dk94YBSnse6PhnW3gktVL7XFyhJy-KEoysb3DsqkL/exec" method="POST">
            <div class="form-group">
                <label for="sale_amount">Sale Amount <span class="optional">(optional)</span></label>
                <input type="number" id="sale_amount" name="sale_amount" step="0.01" placeholder="Enter sale amount">
            </div>
            
            <div class="form-group">
                <label for="expense_name">Expense Name <span class="optional">(optional)</span></label>
                <input type="text" id="expense_name" name="expense_name" placeholder="Enter expense name">
            </div>
            
            <div class="form-group">
                <label for="expense_amount">Expense Amount <span class="optional">(optional)</span></label>
                <input type="number" id="expense_amount" name="expense_amount" step="0.01" placeholder="Enter expense amount">
            </div>
            
            <button type="submit" id="submitBtn">💾 Save to Google Sheets</button>
        </form>
        
        <div id="message" class="message"></div>
        
        <div class="info-box">
            <strong>📊 Where to find your data</strong>
            All entries are saved to your Google Sheets<br>
            Look for "Grocery Tracker" spreadsheet
            <small>All fields are optional - fill any combination</small>
        </div>
        <a href="https://docs.google.com/spreadsheets" target="_blank" class="view-data-btn">Open Google Sheets</a>
    </div>

    <script>
        // Check for success/error from URL parameters (after form submission redirects back)
        const urlParams = new URLSearchParams(window.location.search);
        const messageDiv = document.getElementById('message');
        
        if (urlParams.get('success') === 'true') {
            messageDiv.className = 'message success';
            messageDiv.textContent = '✅ Data saved successfully to Google Sheets!';
            // Clear URL parameters
            window.history.replaceState({}, document.title, window.location.pathname);
            // Clear form
            document.getElementById('trackerForm').reset();
        } else if (urlParams.get('error')) {
            messageDiv.className = 'message error';
            messageDiv.textContent = '❌ Error: ' + decodeURIComponent(urlParams.get('error'));
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        
        // Show loading state on form submit
        document.getElementById('trackerForm').addEventListener('submit', function() {
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Saving... Please wait';
        });
    </script>
</body>
</html>
