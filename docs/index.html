<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grocery Shop Tracker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
            font-size: 28px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .optional {
            color: #999;
            font-weight: normal;
            font-size: 12px;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 8px;
            text-align: center;
            display: none;
            font-size: 14px;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .message.info {
            background: #e3f2fd;
            color: #1565c0;
            display: block;
        }
        .note {
            margin-top: 20px;
            padding: 12px;
            background: #fff3e0;
            border-radius: 8px;
            font-size: 13px;
            color: #e65100;
            text-align: center;
        }
        .config-section {
            margin-bottom: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
        }
        .config-section label {
            font-size: 12px;
            margin-bottom: 5px;
        }
        .config-section input {
            font-size: 12px;
            padding: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛒 Grocery Shop Tracker</h1>
        <p class="subtitle">Sales & Expense Management System</p>
        
        <div class="config-section">
            <label for="apps_script_url">Google Apps Script URL <span class="optional">(required)</span></label>
            <input type="text" id="apps_script_url" placeholder="https://script.google.com/macros/s/.../exec">
        </div>
        
        <form id="trackerForm">
            <div class="form-group">
                <label for="sale_amount">Sale Amount <span class="optional">(optional)</span></label>
                <input type="number" id="sale_amount" name="sale_amount" step="0.01" placeholder="Enter sale amount">
            </div>
            
            <div class="form-group">
                <label for="expense_name">Expense Name <span class="optional">(optional)</span></label>
                <input type="text" id="expense_name" name="expense_name" placeholder="Enter expense name">
            </div>
            
            <div class="form-group">
                <label for="expense_amount">Expense Amount <span class="optional">(optional)</span></label>
                <input type="number" id="expense_amount" name="expense_amount" step="0.01" placeholder="Enter expense amount">
            </div>
            
            <button type="submit" id="submitBtn">Save to Google Sheets</button>
        </form>
        
        <div id="message" class="message"></div>
        
        <div class="note">
            <strong>Setup Required:</strong><br>
            1. Deploy the Google Apps Script (see README)<br>
            2. Paste the Web App URL above<br>
            3. All fields are optional - fill any combination
        </div>
    </div>

    <script>
        // Save URL to localStorage
        document.getElementById('apps_script_url').value = localStorage.getItem('apps_script_url') || '';
        
        document.getElementById('apps_script_url').addEventListener('change', function() {
            localStorage.setItem('apps_script_url', this.value);
        });

        document.getElementById('trackerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const messageDiv = document.getElementById('message');
            const submitBtn = document.getElementById('submitBtn');
            const appsScriptUrl = document.getElementById('apps_script_url').value.trim();
            
            messageDiv.className = 'message';
            messageDiv.textContent = '';
            
            if (!appsScriptUrl) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Please enter your Google Apps Script URL first!';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';
            
            const data = {
                sale_amount: document.getElementById('sale_amount').value,
                expense_name: document.getElementById('expense_name').value,
                expense_amount: document.getElementById('expense_amount').value
            };
            
            try {
                const response = await fetch(appsScriptUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = result.message;
                    document.getElementById('trackerForm').reset();
                    document.getElementById('apps_script_url').value = appsScriptUrl; // restore URL
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = result.message || 'Error saving data';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Error: ' + error.message + '. Make sure the Apps Script is deployed and accessible.';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Save to Google Sheets';
            }
        });
    </script>
</body>
</html>
