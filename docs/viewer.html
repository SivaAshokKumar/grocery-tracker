<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛒 AMRS Shop Tracker - Data Viewer</title>
    <!-- SheetJS for Excel Export -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 80px rgba(0,0,0,0.4);
            max-width: 1200px;
            margin: 0 auto;
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            color: #1a1a2e;
            text-align: center;
            margin-bottom: 8px;
            font-size: 28px;
            font-weight: 700;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 25px;
            font-size: 13px;
        }
        .nav-links {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }
        .nav-links a {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: white;
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            border-radius: 10px;
            border: 2px solid #667eea;
            transition: all 0.3s ease;
        }
        .nav-links a:hover, .nav-links a.active {
            background: #667eea;
            color: white;
        }
        .stats-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .stat-card h3 {
            font-size: 14px;
            opacity: 0.9;
            margin-bottom: 8px;
        }
        .stat-card .value {
            font-size: 28px;
            font-weight: 700;
        }
        .actions {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f5f5f5;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .config-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .config-section label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 5px;
            display: block;
        }
        .config-section input {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 10px;
            font-size: 13px;
        }
        .config-section small {
            color: #666;
            font-size: 11px;
        }
        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            margin-top: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        th {
            padding: 15px 12px;
            text-align: left;
            font-weight: 600;
            font-size: 13px;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
        }
        tr:nth-child(even) {
            background: #f8f9fa;
        }
        tr:hover {
            background: #e3f2fd;
        }
        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 16px;
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #b1dfbb;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f1b0b7;
        }
        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .filters input {
            flex: 1;
            min-width: 150px;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 13px;
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            .container {
                padding: 20px 15px;
            }
            h1 {
                font-size: 22px;
            }
            .stats-cards {
                grid-template-columns: 1fr;
            }
            .actions {
                flex-direction: column;
            }
            .btn {
                width: 100%;
            }
            th, td {
                padding: 10px 8px;
                font-size: 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 AMRS Shop Tracker</h1>
        <p class="subtitle">Transaction History & Reports</p>
        
        <div class="nav-links">
            <a href="index.html">📥 Entry</a>
            <a href="viewer.html" class="active">📊 View Data</a>
        </div>
        
        <div class="config-section" id="configSection">
            <label>Supabase URL</label>
            <input type="text" id="supabaseUrl" placeholder="https://xxxxxx.supabase.co">
            <label>Supabase Anon Key</label>
            <input type="password" id="supabaseKey" placeholder="eyJ...">
            <small>⚙️ These are saved locally in your browser</small>
            <div style="margin-top: 10px;">
                <button class="btn btn-primary" onclick="saveConfig()">💾 Save Configuration</button>
            </div>
        </div>
        
        <div id="statsContainer" style="display: none;">
            <div class="stats-cards">
                <div class="stat-card">
                    <h3>Total Transactions</h3>
                    <div class="value" id="totalCount">0</div>
                </div>
                <div class="stat-card">
                    <h3>Total Sales</h3>
                    <div class="value" id="totalSales">₹0</div>
                </div>
                <div class="stat-card">
                    <h3>Total Expenses</h3>
                    <div class="value" id="totalExpenses">₹0</div>
                </div>
                <div class="stat-card">
                    <h3>Net Balance</h3>
                    <div class="value" id="netBalance">₹0</div>
                </div>
            </div>
            
            <div class="actions">
                <button class="btn btn-primary" onclick="loadData()">🔄 Refresh Data</button>
                <button class="btn btn-secondary" onclick="exportToExcel()">📥 Export to Excel</button>
                <button class="btn btn-secondary" onclick="clearAllData()">🗑️ Clear All Data</button>
            </div>
            
            <div class="filters">
                <input type="text" id="searchInput" placeholder="🔍 Search by expense name..." onkeyup="filterData()">
                <input type="date" id="dateFrom" placeholder="From date" onchange="filterData()">
                <input type="date" id="dateTo" placeholder="To date" onchange="filterData()">
            </div>
            
            <div id="message"></div>
            
            <div class="table-container">
                <div id="tableContent">
                    <div class="loading">Loading data...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allData = [];
        
        // ==========================================
        // HARDCODED SUPABASE CONFIGURATION
        // Replace these with your actual credentials
        // ==========================================
        const SUPABASE_URL = 'https://qgnmyqayxylfacrnhxiw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFnbm15cWF5eHlsZmFjcm5oeGl3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMDgxMjcsImV4cCI6MjA5Mzg4NDEyN30.emW2ijd4y7VLwdI0phDphtm7tvHzz1p9TcisWcBl7mk';
        
        // Helper function to get credentials (hardcoded or from localStorage)
        function getCredentials() {
            return {
                url: localStorage.getItem('supabase_url') || SUPABASE_URL,
                key: localStorage.getItem('supabase_key') || SUPABASE_ANON_KEY
            };
        }
        
        // Load saved configuration
        document.getElementById('supabaseUrl').value = localStorage.getItem('supabase_url') || '';
        document.getElementById('supabaseKey').value = localStorage.getItem('supabase_key') || '';
        
        // Check if configured (either hardcoded or in localStorage)
        const creds = getCredentials();
        if (creds.url && creds.key) {
            document.getElementById('configSection').style.display = 'none';
            document.getElementById('statsContainer').style.display = 'block';
            loadData();
        }
        
        function saveConfig() {
            const url = document.getElementById('supabaseUrl').value.trim();
            const key = document.getElementById('supabaseKey').value.trim();
            
            if (!url || !key) {
                showMessage('Please enter both Supabase URL and Key', 'error');
                return;
            }
            
            localStorage.setItem('supabase_url', url);
            localStorage.setItem('supabase_key', key);
            document.getElementById('configSection').style.display = 'none';
            document.getElementById('statsContainer').style.display = 'block';
            showMessage('✅ Configuration saved! Loading data...', 'success');
            loadData();
        }
        
        function showMessage(text, type) {
            const msgDiv = document.getElementById('message');
            msgDiv.className = 'message ' + type;
            msgDiv.textContent = text;
            setTimeout(() => {
                msgDiv.className = '';
                msgDiv.textContent = '';
            }, 5000);
        }
        
        async function loadData() {
            const { url: supabaseUrl, key: supabaseKey } = getCredentials();
            
            if (!supabaseUrl || !supabaseKey) {
                document.getElementById('configSection').style.display = 'block';
                document.getElementById('statsContainer').style.display = 'none';
                return;
            }
            
            document.getElementById('tableContent').innerHTML = '<div class="loading">Loading data...</div>';
            
            try {
                const response = await fetch(`${supabaseUrl}/rest/v1/transactions?order=created_at.desc`, {
                    method: 'GET',
                    headers: {
                        'apikey': supabaseKey,
                        'Authorization': `Bearer ${supabaseKey}`
                    }
                });
                
                if (response.ok) {
                    allData = await response.json();
                    displayData(allData);
                    updateStats(allData);
                } else {
                    const error = await response.text();
                    document.getElementById('tableContent').innerHTML = `<div class="no-data">❌ Error loading data: ${error}</div>`;
                }
            } catch (error) {
                document.getElementById('tableContent').innerHTML = `<div class="no-data">❌ Error: ${error.message}</div>`;
            }
        }
        
        function displayData(data) {
            if (data.length === 0) {
                document.getElementById('tableContent').innerHTML = '<div class="no-data">📭 No transactions yet. Add some data from the Entry page!</div>';
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Date & Time</th>
                            <th>Sale Amount (₹)</th>
                            <th>Expense Name</th>
                            <th>Expense Amount (₹)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            data.forEach((row, index) => {
                const date = new Date(row.created_at).toLocaleString('en-IN', {
                    day: '2-digit',
                    month: 'short',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                html += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${date}</td>
                        <td>${row.sale_amount ? '₹' + parseFloat(row.sale_amount).toFixed(2) : '-'}</td>
                        <td>${row.expense_name || '-'}</td>
                        <td>${row.expense_amount ? '₹' + parseFloat(row.expense_amount).toFixed(2) : '-'}</td>
                        <td>
                            <button onclick="deleteRow('${row.id}')" style="background: #dc3545; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-size: 12px;">🗑️ Delete</button>
                        </td>
                    </tr>
                `;
            });
            
            html += '</tbody></table>';
            document.getElementById('tableContent').innerHTML = html;
        }
        
        function updateStats(data) {
            const totalCount = data.length;
            const totalSales = data.reduce((sum, row) => sum + (parseFloat(row.sale_amount) || 0), 0);
            const totalExpenses = data.reduce((sum, row) => sum + (parseFloat(row.expense_amount) || 0), 0);
            const netBalance = totalSales - totalExpenses;
            
            document.getElementById('totalCount').textContent = totalCount;
            document.getElementById('totalSales').textContent = '₹' + totalSales.toFixed(2);
            document.getElementById('totalExpenses').textContent = '₹' + totalExpenses.toFixed(2);
            document.getElementById('netBalance').textContent = '₹' + netBalance.toFixed(2);
            document.getElementById('netBalance').style.color = netBalance >= 0 ? '#28a745' : '#dc3545';
        }
        
        function filterData() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;
            
            let filtered = allData.filter(row => {
                const matchesSearch = !search || 
                    (row.expense_name && row.expense_name.toLowerCase().includes(search));
                
                const rowDate = new Date(row.created_at);
                const matchesFrom = !dateFrom || rowDate >= new Date(dateFrom);
                const matchesTo = !dateTo || rowDate <= new Date(dateTo + 'T23:59:59');
                
                return matchesSearch && matchesFrom && matchesTo;
            });
            
            displayData(filtered);
            updateStats(filtered);
        }
        
        async function deleteRow(id) {
            if (!confirm('Are you sure you want to delete this transaction?\n\nIt will be moved to Recycle Bin.')) return;
            
            const { url: supabaseUrl, key: supabaseKey } = getCredentials();
            
            try {
                // Step 1: Get the row data before deleting
                const getResponse = await fetch(`${supabaseUrl}/rest/v1/transactions?id=eq.${id}`, {
                    method: 'GET',
                    headers: {
                        'apikey': supabaseKey,
                        'Authorization': `Bearer ${supabaseKey}`
                    }
                });
                
                if (!getResponse.ok) {
                    showMessage('❌ Error fetching transaction data', 'error');
                    return;
                }
                
                const rowData = await getResponse.json();
                if (rowData.length === 0) {
                    showMessage('❌ Transaction not found', 'error');
                    return;
                }
                
                const row = rowData[0];
                
                // Step 2: Copy to recycle_bin table
                const recycleData = {
                    original_id: row.id,
                    created_at: row.created_at,
                    deleted_at: new Date().toISOString(),
                    sale_amount: row.sale_amount,
                    expense_name: row.expense_name,
                    expense_amount: row.expense_amount
                };
                
                const recycleResponse = await fetch(`${supabaseUrl}/rest/v1/recycle_bin`, {
                    method: 'POST',
                    headers: {
                        'apikey': supabaseKey,
                        'Authorization': `Bearer ${supabaseKey}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify(recycleData)
                });
                
                if (!recycleResponse.ok) {
                    showMessage('❌ Error moving to recycle bin', 'error');
                    return;
                }
                
                // Step 3: Delete from transactions table
                const deleteResponse = await fetch(`${supabaseUrl}/rest/v1/transactions?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': supabaseKey,
                        'Authorization': `Bearer ${supabaseKey}`
                    }
                });
                
                if (deleteResponse.ok) {
                    showMessage('✅ Transaction moved to Recycle Bin!', 'success');
                    loadData();
                } else {
                    showMessage('❌ Error deleting transaction', 'error');
                }
            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'error');
            }
        }
        
        function exportToExcel() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;
            
            let exportData = allData.filter(row => {
                const matchesSearch = !search || 
                    (row.expense_name && row.expense_name.toLowerCase().includes(search));
                
                const rowDate = new Date(row.created_at);
                const matchesFrom = !dateFrom || rowDate >= new Date(dateFrom);
                const matchesTo = !dateTo || rowDate <= new Date(dateTo + 'T23:59:59');
                
                return matchesSearch && matchesFrom && matchesTo;
            });
            
            if (exportData.length === 0) {
                showMessage('No data to export', 'error');
                return;
            }
            
            const excelData = exportData.map((row, index) => ({
                'S.No': index + 1,
                'Date & Time': new Date(row.created_at).toLocaleString('en-IN'),
                'Sale Amount (₹)': row.sale_amount || '',
                'Expense Name': row.expense_name || '',
                'Expense Amount (₹)': row.expense_amount || ''
            }));
            
            // Add summary row
            const totalSales = exportData.reduce((sum, row) => sum + (parseFloat(row.sale_amount) || 0), 0);
            const totalExpenses = exportData.reduce((sum, row) => sum + (parseFloat(row.expense_amount) || 0), 0);
            
            excelData.push({
                'S.No': '',
                'Date & Time': 'TOTAL',
                'Sale Amount (₹)': totalSales,
                'Expense Name': '',
                'Expense Amount (₹)': totalExpenses
            });
            
            excelData.push({
                'S.No': '',
                'Date & Time': 'NET BALANCE',
                'Sale Amount (₹)': totalSales - totalExpenses,
                'Expense Name': '',
                'Expense Amount (₹)': ''
            });
            
            const ws = XLSX.utils.json_to_sheet(excelData);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, 'Transactions');
            
            const date = new Date().toISOString().split('T')[0];
            XLSX.writeFile(wb, `Grocery_Tracker_${date}.xlsx`);
            
            showMessage('✅ Excel file downloaded!', 'success');
        }
        
        async function clearAllData() {
            if (!confirm('⚠️ WARNING: This will delete ALL transactions!\n\nAre you sure?')) return;
            if (!confirm('Really sure? This cannot be undone!')) return;
            
            const { url: supabaseUrl, key: supabaseKey } = getCredentials();
            
            try {
                const response = await fetch(`${supabaseUrl}/rest/v1/transactions`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': supabaseKey,
                        'Authorization': `Bearer ${supabaseKey}`
                    }
                });
                
                if (response.ok) {
                    showMessage('✅ All data cleared!', 'success');
                    loadData();
                } else {
                    showMessage('❌ Error clearing data', 'error');
                }
            } catch (error) {
                showMessage('❌ Error: ' + error.message, 'error');
            }
        }
    </script>
</body>
</html>
